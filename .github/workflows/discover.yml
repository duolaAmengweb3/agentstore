name: Discover new tools

on:
  schedule:
    # 每天 UTC 01:00(北京时间早上 9 点)
    - cron: '0 1 * * *'
  workflow_dispatch:

concurrency:
  group: discover-new-tools
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # 写 discoveries json + 自动 onboard 信任源
      issues: write        # 建 issue 让你审 review 候选
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 需要完整历史才能 push

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Scan Smithery / npm / GitHub for new crypto AI tools
        id: discover
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/discover-new-tools.mjs

      - name: Auto-onboard trusted sources
        id: onboard
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/onboard-candidate.mjs --all-trusted

      - name: Sync md → generated/tools.ts
        run: npm run sync:tools

      - name: Commit discoveries + any auto-onboarded tools
        id: commit
        run: |
          git config user.name "agentstore-bot"
          git config user.email "bot@agentstore.xyz"
          git add content/discoveries content/tools src/lib/generated
          if git diff --cached --quiet; then
            echo "nothing to commit"
            echo "committed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          MSG="chore(discover): $(date -u +'%Y-%m-%d') — ${{ steps.discover.outputs.total || 0 }} candidates, ${{ steps.onboard.outputs.onboarded || 0 }} auto-onboarded"
          git commit -m "$MSG"
          git push
          echo "committed=true" >> $GITHUB_OUTPUT

      - name: Create review issue for community candidates
        if: steps.discover.outputs.review_count != '0' && steps.discover.outputs.review_count != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ONBOARDED: ${{ steps.onboard.outputs.onboarded || 0 }}
        run: |
          DATE=$(date -u +'%Y-%m-%d')
          FILE="content/discoveries/${DATE}.json"

          if [ ! -f "$FILE" ]; then
            echo "no discovery file for today, skip"
            exit 0
          fi

          # 把 onboarded 数字注入 json(给 build-issue-body 用)
          node -e "
            const fs = require('fs');
            const d = JSON.parse(fs.readFileSync('$FILE', 'utf8'));
            d.onboarded = Number(process.env.ONBOARDED || 0);
            fs.writeFileSync('$FILE', JSON.stringify(d, null, 2));
          "

          # 生成 issue body
          node scripts/build-issue-body.mjs "$FILE" > /tmp/issue_body.md

          # labels 先确保存在(幂等)
          gh label create discover   --color 0052cc --description "Tool discovery" --force || true
          gh label create new-tools  --color c5def5 --description "New tool candidates" --force || true

          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "🔍 Tool candidates for ${DATE} — ${{ steps.discover.outputs.review_count }} new" \
            --body-file /tmp/issue_body.md \
            --label "discover,new-tools"
